name: Manual Deploy (Rollback)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version to deploy (e.g., 1.9.0, 1.8.0, production)'
        required: true
        default: 'production'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nielspilgaard/minimoeder-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Update image tag in Dokploy
        run: |
          curl --fail --show-error --silent \
            -X POST "https://admin.mini-moeder.dk/api/application.update" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APPLICATION_ID }}","dockerImage":"ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.version }}","sourceType":"docker"}'

      - name: Deploy via Dokploy
        run: |
          curl --fail --show-error --silent \
            -X POST "https://admin.mini-moeder.dk/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APPLICATION_ID }}"}'

      - name: Create Deployment on elmah.io
        uses: elmahio/github-create-deployment-action@v1
        with:
          apiKey: ${{ secrets.ELMAH_IO_API_KEY }}
          version: ${{ inputs.version }}
          logId: ${{ secrets.ELMAH_IO_LOG_ID }}
          userName: ${{ github.actor }}
          description: "Manual deployment/rollback to version ${{ inputs.version }}"
